# 1. Tự động chuyển hướng từ HTTP (80) sang HTTPS (443)
server {
    listen 80;
    server_name yumestudio.id.vn www.yumestudio.id.vn;

    # Cho phép truy cập bằng IP qua cổng 80
    # Nếu truy cập bằng domain, redirect sang HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. Cấu hình chính cho HTTPS (443)
server {
    listen 443 ssl;
    server_name yumestudio.id.vn www.yumestudio.id.vn;

    ssl_certificate     /etc/letsencrypt/live/yumestudio.id.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yumestudio.id.vn/privkey.pem;

    # Tối ưu SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests
    location /api {
        proxy_pass         http://backend:5002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}